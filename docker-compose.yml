services:
  zhuimange:
    image: ghcr.io/lwhx/zhuimange:latest
    container_name: zhuimange
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8280:8000"
    volumes:
      # 宿主机需保证该目录可被 UID 1000 写入：
      #   chown -R 1000:1000 ./data
      - ./data:/app/data:rw
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/tracker.db
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
    security_opt:
      # 启用 no-new-privileges，禁止子进程提权
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
      - /run:rw,noexec,nosuid,size=10m
    cap_drop:
      - ALL
    # 端口 8000 > 1024，无需 NET_BIND_SERVICE 能力
    pids_limit: 100
    mem_limit: 512m
    memswap_limit: 512m
    cpu_shares: 512
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
