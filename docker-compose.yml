services:
  zhuimange:
    image: ghcr.io/lwhx/zhuimange:latest
    container_name: zhuimange
    build:
      context: .
      dockerfile: Dockerfile
    # 个人内网部署（仅 127.0.0.1:8280 暴露）为简化挂载卷权限管理，容器以 root 运行。
    # 公网暴露或多租户场景建议改回非 root（取消 user，配合 chown -R 1000:1000 ./data）。
    user: "0:0"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8280:8000"
    volumes:
      # 容器以 root 运行，可直接读写挂载卷，无需 chown
      - ./data:/app/data:rw
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/tracker.db
      - TZ=Asia/Shanghai
      - PORT=8000
    security_opt:
      # 启用 no-new-privileges，禁止子进程提权
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
      - /run:rw,noexec,nosuid,size=10m
    cap_drop:
      - ALL
    # 端口 8000 > 1024，无需 NET_BIND_SERVICE 能力
    pids_limit: 100
    # Go 版内存占用约 30MB，256MB 上限绰绰有余
    mem_limit: 256m
    memswap_limit: 256m
    cpu_shares: 512
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
