name: Release Binaries

# 打 tag（v*）时触发：交叉编译多平台二进制并发布到 GitHub Releases。
# 与 docker-publish.yml 同步触发，二者互不依赖（Docker 走镜像，本工作流走二进制）。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # 创建 Release 需要

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: true
          cache-dependency-path: go/go.sum

      - name: Resolve version
        id: ver
        run: |
          # tag 形如 v1.0.0 → VERSION=1.0.0；workflow_dispatch 时用 sha
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "name=dev-$(date +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      # 矩阵构建：5 个目标平台。modernc.org/sqlite 是纯 Go，CGO_ENABLED=0 可纯静态编译。
      - name: Cross-compile binaries
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          for target in \
            "linux/amd64"      "linux/arm64" \
            "windows/amd64"    "darwin/amd64" \
            "darwin/arm64"; do
            os="${target%/*}"
            arch="${target#*/}"
            # 二进制名：zhuimange-{version}-{os}-{arch}[.exe]
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            out="dist/zhuimange-${VERSION}-${os}-${arch}${ext}"
            echo "::group::Building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
              -o "$out" ./cmd/zhuimange
            echo "::endgroup::"
          done
          ls -lh dist/

      - name: Create per-platform tarballs
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p release
          cd dist
          for f in zhuimange-*; do
            # 把每个二进制单独打包（含同名 zhuimange 二进制，便于解压即用）
            dir="${f%.exe}"
            mkdir -p "pkg/$dir"
            cp "$f" "pkg/$dir/zhuimange${f##*.exe}"
            printf '追漫阁 %s\n直接运行 ./zhuimange 启动。\n配置通过环境变量或 .env 文件传入（参考仓库根 .env.example）。\n' "$VERSION" > "pkg/$dir/README.txt"
            # Windows 用 zip，其他用 tar.gz
            case "$f" in
              *.exe) (cd "pkg/$dir" && zip -q "../../release/${f}.zip" .);;
              *)     tar -czf "release/${f}.tar.gz" -C "pkg/$dir" .;;
            esac
          done
          # 生成 SHA256SUMS
          cd release
          sha256sum * | tee SHA256SUMS.txt
          ls -lh

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: ${{ steps.ver.outputs.name }}
          name: ${{ steps.ver.outputs.name }}
          generate_release_notes: true
          files: |
            dist/release/*.tar.gz
            dist/release/*.zip
            dist/release/SHA256SUMS.txt
